     <button onclick="
	const randNum = Math.random();
	let compMove = '';

	if(randNum>=0 && randNum<1/3 ){
	  compMove = 'rock';
	}
	else if(randNum>=1/3 && randNum<2/3){
	  compMove = 'paper';
	}
	else if(randNum>=2/3 && randNum<1){
	  compMove = 'scissors';
	}
	/*console.log(compMove);*/

	let result = '';
	if(compMove === 'rock'){
	  result = 'Tie.';
	}
	if(compMove === 'paper'){
	  result = 'You Lose!';
	}
	if(compMove === 'scissors'){
	  result = 'You Win!';
	}

	alert(`You picked rock. Computer picked ${compMove}. \n 	${result}`);
