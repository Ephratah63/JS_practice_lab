<!DOCTYPE html>
<html>

  <head>
    <meta charset="UTF-8" lang="en">
    <title>Calculator</title>
    <style>
	body{
		font-family: Pacifico;
		text-align: center;
		color: black;
		background-color: orange;
		margin: 50px;
	}

	h1{
		font-size: 60px;
		line-height: 100px;
	}

	button{
		border: none;
		width: 70px;
		height: 60px;
		border-radius: 5px;
		background-color: orange;
		color: black;
		font-weight: bold;
	}

	div{
	background-color: yellow;
	border: 10px double black;
	padding: 2px;
	}

    </style>
  </head>

  <body>
<div>
<h1>Calculator</h1>
<p class="buttons">
<button onclick="
	calculation+='1';
	console.log(calculation);
">1</button>
<button onclick="
	calculation+='2';
	console.log(calculation);
">2</button>
<button onclick="
	calculation+='3';
	console.log(calculation);
">3</button>
<button onclick="
	calculation+=' + ';
	console.log(calculation);
">+</button>
</p>

<p class="buttons">
<button onclick="
	calculation+='4';
	console.log(calculation);
">4</button>
<button onclick="
	calculation+='5';
	console.log(calculation);
">5</button>
<button onclick="
	calculation+='6';
">6</button>
<button onclick="
	calculation+=' - ';
	console.log(calculation);
">-</button>
</p>

<p class="buttons">
<button onclick="
	calculation='7';
	console.log(calculation);
">7</button>
<button onclick="
	calculation+=8;
	console.log(calculation);
">8</button>
<button onclick="
	calculation+='9';	
	console.log(calculation);
">9</button>
<button onclick="
	calculation+=' * ';
	console.log(calculation);
">x</button>
</p>

<p class="buttons">
<button onclick="
	calculation+='0';
	console.log(calculation);
">0</button>
<button onclick="
	calculation+='.';
	console.log(calculation);
">.</button>
<button onclick="
	calculation=eval(calculation);
	console.log(calculation);
">=</button>
<button onclick="
	calculation+=' / ';
	console.log(calculation);
">/</button>
</p>

<p class="buttons">
<button onclick="
	calculation='';
	console.log(calculation);
">Clear</button>
</p>

      </form>
     <script>
	let calculation='';
	console.log(calculation);
    </script>
  </body>
</html>
